name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build and test
        run: |
          set -o pipefail
          DEVICE_ID=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; print(next(dev['udid'] for rt in d.values() for dev in rt if 'iPhone' in dev['name']))")
          echo "Using simulator UDID: $DEVICE_ID"
          xcodebuild test \
            -project Restaurant/Restaurant.xcodeproj \
            -scheme Restaurant \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO
